name: iOS Build & TestFlight

# Build IPA iOS yang ditandatangani lalu upload ke TestFlight — tanpa Mac.
# Signing otomatis pakai App Store Connect API key (disimpan di GitHub Secrets).
on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14
    env:
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
      BUNDLE_ID: id.pdftoolkit.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Codemagic CLI Tools
        run: |
          python3 -m pip install --break-system-packages codemagic-cli-tools 2>/dev/null \
            || python3 -m pip install codemagic-cli-tools
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Flutter pub get
        run: flutter pub get

      - name: Initialize keychain
        run: keychain initialize

      - name: Fetch signing files (create if missing)
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key="@env:CERTIFICATE_PRIVATE_KEY" \
            --create

      - name: Add certificates to keychain
        run: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        run: xcode-project use-profiles

      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --export-options-plist="$HOME/export_options.plist"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdftoolkit-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore

      - name: Upload to TestFlight
        run: |
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          echo "Uploading $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --testflight
