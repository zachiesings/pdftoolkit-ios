name: Build APK

# Jalan otomatis tiap push ke main, tiap pull request ke main (validasi build
# sebelum merge), atau bisa di-trigger manual dari tab Actions.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Ambil dependencies
        run: flutter pub get

      - name: Generate ikon app (launcher icons)
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release, untuk Play Store)
        run: flutter build appbundle --release

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdftoolkit-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdftoolkit-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
